<!-- RESET Password Page - reset-password.html-->
<!DOCTYPE html>

<html lang="en">

  <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password | Movexa</title>

    <link rel="stylesheet" href="/css/output.css">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <link rel="shortcut icon" href="/favicon/favicon.ico">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
    </style>

  </head>

  <body class="bg-[#F5F6F7] text-gray-900 antialiased flex h-screen overflow-hidden">

    <!-- PAGE TRANSITION STARTS -->
    <div id="pageContent" class="opacity-0 translate-y-2 transition-all duration-500 ease-[cubic-bezier(0.22,1,0.36,1)] h-full w-full">

      <!-- STARTS: MAIN -->
      <main class="flex-1 flex w-full h-full overflow-hidden bg-white">

        <!-- TYPE: Reset Password Form Image (On left side of the page) -->
        <div class="hidden lg:block w-1/2 h-full bg-gray-100">
          <img src="/assets/truckerimage.jpg" alt="Trucker Image" class="w-full h-full object-cover">
        </div>

        <!-- TYPE: Sign In Form (On right side of the page) -->
        <div class="w-full lg:w-1/2 h-full flex flex-col justify-center items-center bg-white px-6 sm:px-8 overflow-y-auto">
          <div class="w-full max-w-md py-12">

            <!-- Movexa Logo -->
            <div class="flex justify-center mb-10">
              <img src="/assets/movexalogolight.png" alt="movexaLogo" class="h-9 w-auto object-contain">
            </div>

            <!-- Reset Password Header + Tagline -->
            <div class="text-center mb-8">
              <h1 class="text-[26px] font-semibold tracking-tight text-[#1E1E1E] mb-2">Reset Password</h1>
              <p class="text-[16px] text-[#858A93] font-regular">Please enter your new password.</p>
            </div>

            <!-- STARTS: Password reset Form -->
            <form id="resetPasswordForm" class="space-y-3">

              <!-- INPUT: New Password -->
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                  <img src="/maincontenticons/passwordlock.svg" class="w-4 h-4" alt="emailIcon">
                </div>
                <input id="password" type="password"
                  class="w-full border border-[#EFF3F6]/50 rounded-lg pl-11 pr-4 py-2.5 text-[14px] font-medium text-gray-900 focus:ring-1 focus:ring-[#CDD5DF] outline-none transition-shadow bg-[#EFF3F6]/50"
                  placeholder="Enter new password">
              </div>

              <!-- INPUT: Confirm New Password -->
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                  <img src="/maincontenticons/passwordlock.svg" class="w-4 h-4" alt="emailIcon">
                </div>
                <input id="confirmPassword" type="password"
                  class="w-full border border-[#EFF3F6]/50 rounded-lg pl-11 pr-4 py-2.5 text-[14px] font-medium text-gray-900 focus:ring-1 focus:ring-[#CDD5DF] outline-none transition-shadow bg-[#EFF3F6]/50"
                  placeholder="Confirm new password">
              </div>

              <p id="message" class="hidden text-sm text-center"></p>

              <!-- RESET Password BUTTON -->
              <button id="resetBtn" type="submit"
                class="w-full bg-[#ff4444] text-white rounded-lg py-2.5 text-base font-medium hover:bg-red-500 transition-colors mt-6 shadow-[0_1px_2px_rgba(0,0,0,0.05)]">
                Reset Password
              </button>
            </form>

            <p class="text-center text-[14px] font-normal text-[#858A93] mt-8">
              Go to
              <a href="/login" class="font-medium text-[#F93C3F] hover:text[#F93C3F] transition-colors">
                Sign in
              </a>
            </p>
          </div>
        </div>
      </main>
      <!-- ENDS: MAIN -->

    </div>
    <!-- PAGE TRANSITION ENDS -->
     
    <div id="pageTransition" class="fixed inset-0 z-[9999] bg-white/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 flex items-center justify-center">
      <div class="flex flex-col items-center gap-4">
        <div class="w-10 h-10 rounded-full border-4 border-gray-200 border-t-[#F93C3F] animate-spin"></div>
        <p id="pageTransitionText" class="text-sm text-gray-500">Loading...</p>
      </div>
    </div>

    <!-- .js file references -->

    <script>
      lucide.createIcons();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/transitions.js"></script>
    <script src="/js/reset-password.js"></script>
  </body>

</html>
