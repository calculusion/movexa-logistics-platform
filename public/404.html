<!DOCTYPE html>

<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Page Not Found | Movexa</title>
    
    <link rel="stylesheet" href="/css/output.css">

    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <link rel="shortcut icon" href="/favicon/favicon.ico">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
    </style>
  </head>

  <body class="relative min-h-screen overflow-hidden">

    <!-- PAGE TRANSITION STARTS -->
    <div id="pageContent" class="opacity-0 translate-y-2 transition-all duration-500 ease-[cubic-bezier(0.22,1,0.36,1)] h-full w-full">

      <!-- ERROR 404: Background Image -->
      <img src="/error-backgrounds/404.webp" alt="pageNotFound" class="absolute inset-0 h-full w-full object-cover">

      <!-- BUTTON: Back to Dashboard -->
      <div class="relative z-10 flex min-h-screen items-end justify-center px-6 pb-12">
        <a
          href="/dashboard"
          class="inline-flex items-center justify-center rounded-lg bg-[#0A0A0A] px-6 py-3 text-sm font-medium text-white shadow-lg transition-all duration-300 hover:bg-[#0A0A0A] active:scale-[0.98]">
          Back to Dashboard
        </a>
      </div>
    </div>
    <!-- PAGE TRANSITION ENDS -->
    
    <div id="pageTransition" class="fixed inset-0 z-[9999] bg-white/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 flex items-center justify-center">
      <div class="flex flex-col items-center gap-4">
          <div class="w-10 h-10 rounded-full border-4 border-gray-200 border-t-[#F93C3F] animate-spin"></div>
          <p id="pageTransitionText" class="text-sm text-gray-500">Loading...</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/transitions.js"></script>

  </body>
</html>
