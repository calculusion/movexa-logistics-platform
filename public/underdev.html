<!DOCTYPE html>

<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Under Development | Movexa</title>

    <link rel="stylesheet" href="/css/output.css">

    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <link rel="shortcut icon" href="/favicon/favicon.ico">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
    </style>
    <style>
      #protectedContent {
        opacity: 0;
        transition: opacity 0.15s ease;
      }
    </style>
  </head>

  <body class="relative min-h-screen overflow-hidden">

    <div id="mobileWarning" class="hidden fixed inset-0 z-[99999] bg-[#F5F6F7] items-center justify-center p-8">
      <div class="max-w-md text-center">
        <img src="/assets/movexalogolight.png" class="h-5 mx-auto mb-8" alt="Movexa">

        <div class="flex justify-center mb-6">
          <img src="/maincontenticons/desktop.svg" class="w-16 h-16" alt="desktop">
        </div>

        <h1 class="text-[16px] font-bold text-[#2D2D2D] mb-4">
            Desktop Experience Recommended
        </h1>
        <p class="text-gray-500 text-[14px] leading-relaxed">
            Movexa is currently optimized for desktop and laptop devices.
            Please access the platform using a screen width of at least 1024 pixels for the best experience.
        </p>
      </div>
    </div>

    <div id="protectedContent">

      <!-- PAGE TRANSITION STARTS -->
      <div id="pageContent" class="opacity-0 translate-y-2 transition-all duration-500 ease-[cubic-bezier(0.22,1,0.36,1)] h-full w-full">

            <!-- Under Development -->
            <img src="/assets/underdev.webp" alt="underdev" class="absolute inset-0 h-full w-full object-cover">

            <div class="relative z-10 flex min-h-screen items-end justify-center px-6 pb-12">
              <a
                href="/dashboard"
                class="inline-flex items-center justify-center rounded-lg bg-[#F93C3F] px-6 py-3 text-sm font-medium text-white shadow-lg transition-all duration-300 hover:bg-[#F93C3F] active:scale-[0.98]">
                Back to Dashboard
              </a>
            </div>


      </div>
    </div>
    <!-- PAGE TRANSITION ENDS -->
      
    <div id="pageTransition" class="fixed inset-0 z-[9999] bg-white/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 flex items-center justify-center">
      <div class="flex flex-col items-center gap-4">
          <div class="w-10 h-10 rounded-full border-4 border-gray-200 border-t-[#F93C3F] animate-spin"></div>
          <p id="pageTransitionText" class="text-sm text-gray-500">Loading...</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth-guard.js"></script>
    <script src="/js/transitions.js"></script>
  </body>
  
</html>
