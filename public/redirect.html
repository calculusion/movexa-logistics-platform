<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Preparing Dashboard | Movexa</title>

    <link rel="stylesheet" href="/css/output.css">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <link rel="shortcut icon" href="/favicon/favicon.ico">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
    <style>
        #protectedContent {
          opacity: 0;
          transition: opacity 0.15s ease;
        }
      </style>
</head>

<body class="min-h-screen bg-white flex items-center justify-center">

    <div id="protectedContent">

        <div class="flex flex-col items-center text-center px-6">

            <lottie-player src="/animations/redirect.json" background="transparent" speed="1"
                style="width:240px; height:240px;" loop autoplay>
            </lottie-player>

            <h1 class="mt-2 text-[24px] font-semibold text-[#1E1E1E]">
                Please wait
            </h1>

            <p id="redirectStatus" class="mt-2 text-[15px] text-[#858A93] transition-all duration-700 transform">
                Loading...
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth-guard.js"></script>
    <script src="/js/redirect.js"></script>

</body>

</html>
